version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: book_trade_db
    ports:
      - "3309:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  app:
    build: .
    container_name: php-app
    ports:
      - "8080:80"
    depends_on:
      - database
    volumes:
      - ./:/var/www/html/
    environment:
      MYSQL_HOST: database
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: book_trade_db
    restart: unless-stopped

volumes:
  mysql-data: